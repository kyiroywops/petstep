name: fishbyte
description: "Fishbyte App."
publish_to: 'none'
version: 2.1.6+13

environment:
  sdk: ^3.5.4

dependencies:
  app_links: ^6.4.0
  camera: ^0.11.0+2
  connectivity_plus: ^6.1.2
  dio: ^5.7.0
  fl_chart: ^1.0.0
  flutter:
    sdk: flutter
  flutter_blue_plus: ^1.34.5
  flutter_dotenv: ^5.2.1
  flutter_exif_rotation: ^0.5.2
  flutter_local_notifications: ^19.0.0
  flutter_riverpod: ^2.6.1
  flutter_svg: ^2.0.16
  font_awesome_flutter: ^10.8.0
  go_router: ^15.1.1
  google_fonts: ^6.2.1
  google_sign_in: ^6.3.0
  graphql_flutter: ^5.1.2
  http: ^1.3.0
  http_parser: ^4.1.2
  image: ^4.5.2
  image_picker: ^1.1.2
  intl: ^0.20.2
  jwt_decoder: ^2.0.1
  mime: ^2.0.0
  path: ^1.9.0
  path_provider: ^2.1.5
  permission_handler: ^12.0.0+1
  pull_to_refresh: ^2.0.0
  sentry_flutter: ^9.0.0
  shared_preferences: ^2.3.3
  smooth_page_indicator: ^1.2.0+3
  supabase_flutter: ^2.8.4
  url_launcher: ^6.3.1
  uuid: ^4.5.1

dev_dependencies:
  build_runner: ^2.4.15
  flutter_launcher_icons: ^0.14.2
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.4
  flutter_test:
    sdk: flutter
  mockito: ^5.4.5
  path_provider_platform_interface: ^2.1.2
  plugin_platform_interface: ^2.1.8
  shared_preferences_platform_interface: ^2.4.1

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icons/icon1024.png"
  adaptive_icon_foreground: "/assets/icons/icon1024.png"

flutter_native_splash:
  color: "#000000"
  image: assets/images/splash.png
  android: true
  ios: true

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/icons/
    - assets/images/
    - assets/jsons/
    - assets/svg/
    - assets/images/tutorial/
