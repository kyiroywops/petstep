name: amclub
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.3.4 <4.0.0'

dependencies:
  cloud_firestore: ^5.0.0
  firebase_auth: ^5.0.0
  firebase_core: ^3.0.0
  flutter:
    sdk: flutter
  flutter_keyboard_visibility: ^6.0.0
  flutter_localization: ^0.2.0
  flutter_native_splash: ^2.4.0
  flutter_riverpod: ^2.5.1
  flutter_slidable: ^3.1.0
  flutter_svg: ^2.0.10+1
  font_awesome_flutter: ^10.7.0
  go_router: ^14.0.2
  google_nav_bar: ^5.0.6
  intl: ^0.19.0
  sleek_circular_slider: ^2.0.1
  table_calendar: ^3.0.9
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icons/icon1024.png"

flutter_native_splash:
  color: "#1B1412"
  image: assets/images/splash.png
  android: true
  ios: true

flutter:
  uses-material-design: true

  fonts:
    - family: Outfit
      fonts:
        - asset: assets/fonts/Outfit-Black.ttf
          weight: 900
        - asset: assets/fonts/Outfit-Bold.ttf
          weight: 700
        - asset: assets/fonts/Outfit-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Outfit-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Outfit-Light.ttf
          weight: 300
        - asset: assets/fonts/Outfit-Medium.ttf
          weight: 500
        - asset: assets/fonts/Outfit-Regular.ttf
          weight: 400
        - asset: assets/fonts/Outfit-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Outfit-Thin.ttf
          weight: 100
    - family: HindMadurai
      fonts:
        - asset: assets/fonts/HindMadurai-Bold.ttf
          weight: 700
        - asset: assets/fonts/HindMadurai-Light.ttf
          weight: 300
        - asset: assets/fonts/HindMadurai-Medium.ttf
          weight: 500
        - asset: assets/fonts/HindMadurai-Regular.ttf
          weight: 400
        - asset: assets/fonts/HindMadurai-SemiBold.ttf
          weight: 600

  assets:
    - assets/icons/
    - assets/images/
    - assets/jsons/
    - assets/images/icons/
